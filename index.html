<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evaluación CEPER-III</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-color: #ffffff; --text-soft: #0f766e; }
        body { font-family: 'Segoe UI', sans-serif; color: var(--text-soft); overflow: hidden; touch-action: pan-y; }
        .likert-btn { transition: all 0.2s; touch-action: manipulation; }
        .likert-btn:hover { transform: scale(1.05); background-color: #f0fdfa; }
        .message-fade-in { animation: fadeIn 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-[100dvh] w-full">
    <!-- PANEL LATERAL -->
    <div id="sidebar" class="hidden md:flex flex-col w-1/3 border-r border-teal-100 bg-white p-8 overflow-y-auto">
        <h2 class="text-2xl font-bold text-teal-800">CEPER-III</h2>
        <p class="text-sm text-teal-600 mb-6">Evaluación de Personalidad</p>
        <div class="space-y-4 text-sm text-slate-600 leading-relaxed text-justify">
            <p><strong>Privacidad:</strong> Los datos serán utilizados con fines investigativos y/o académicos, cuidando siempre la confidencialidad.</p>
            <p><strong>Instrucciones:</strong> Responde del 1 (Nada característico) al 7 (Totalmente característico).</p>
        </div>
    </div>

    <!-- PANEL CHAT -->
    <div class="flex-1 flex flex-col bg-slate-50">
        <header class="h-16 border-b bg-white flex items-center px-6 shadow-sm">
            <div class="w-full bg-teal-100 h-1.5 rounded-full"><div id="progress-bar" class="bg-teal-500 h-1.5 rounded-full transition-all" style="width:0%"></div></div>
        </header>
        <main id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6"></main>
        <footer id="interaction-area" class="bg-white border-t p-4 min-h-[100px]"></footer>
    </div>

    <script>
        // --- BASE DE DATOS GEOGRÁFICA ---
        const geoData = { "América del Sur": { "Colombia": { "Amazonas": ["Leticia"], "Antioquia": ["Medellín", "Envigado", "Bello"], "Atlántico": ["Barranquilla"], "Bogotá": ["Bogotá D.C."] } }, "España": { "España": { "Madrid": ["Madrid"], "Cataluña": ["Barcelona"] } } };
        let currentIdx = 0;
        const patientData = { demographics: {}, answers: {} };
        const questions = Array(170).fill("Pregunta clínica CEPER-III..."); // Aquí van las reales

        function addMessage(t, s='bot') {
            const d = document.createElement('div');
            d.className = `flex w-full ${s==='user'?'justify-end':'justify-start'} message-fade-in`;
            d.innerHTML = `<div class="${s==='bot'?'bg-teal-50':'bg-blue-100'} p-4 rounded-2xl max-w-[85%] shadow-sm text-sm">${t}</div>`;
            document.getElementById('chat-container').appendChild(d);
            document.getElementById('chat-container').scrollTo(0, 1e9);
        }

        function clearInt() { document.getElementById('interaction-area').innerHTML = '<div class="text-center p-4 text-teal-600 animate-pulse">Procesando...</div>'; }

        // --- FLUJO ---
        function start() {
            addMessage("¡Hola! Soy tu asistente virtual. Antes de empezar las 170 preguntas, necesito tus datos para el reporte clínico.");
            document.getElementById('interaction-area').innerHTML = `<button onclick="askPsi()" class="bg-teal-600 text-white px-8 py-3 rounded-full w-full">Empezar Registro</button>`;
        }

        function askPsi() {
            clearInt(); addMessage("Empezar", 'user');
            addMessage("¿Quién es tu psicólogo/a?");
            const p = ['Jorge', 'Victor', 'Martha', 'Claudia', 'Johanna'];
            document.getElementById('interaction-area').innerHTML = `<div class="grid grid-cols-2 gap-2">${p.map(x=>`<button onclick="savePsi('${x}')" class="border p-3 rounded-xl hover:bg-teal-50">${x}</button>`).join('')}</div>`;
        }

        function savePsi(x) { 
            patientData.demographics.psicologo = x; addMessage(x, 'user'); 
            addMessage(`Perfecto. ¿Cuáles son tus nombres y apellidos completos?`);
            document.getElementById('interaction-area').innerHTML = `
                <form onsubmit="event.preventDefault(); saveNames(this)" class="flex flex-col gap-2">
                    <input name="n" placeholder="Nombres" required class="border p-3 rounded-xl">
                    <input name="a1" placeholder="Primer Apellido" required class="border p-3 rounded-xl">
                    <input name="a2" placeholder="Segundo Apellido" required class="border p-3 rounded-xl">
                    <button class="bg-teal-600 text-white p-3 rounded-xl">Siguiente</button>
                </form>`;
        }

        function saveNames(f) {
            patientData.demographics.nombres = f.n.value;
            patientData.demographics.primer_apellido = f.a1.value;
            patientData.demographics.segundo_apellido = f.a2.value;
            addMessage(`${f.n.value} ${f.a1.value}`, 'user');
            askDob();
        }

        function askDob() {
            clearInt(); addMessage("¿Tu fecha de nacimiento?");
            document.getElementById('interaction-area').innerHTML = `
                <form onsubmit="event.preventDefault(); saveDob(this)" class="flex gap-2">
                    <input name="d" type="number" placeholder="DD" required class="w-1/4 border p-3 rounded-xl">
                    <input name="m" type="number" placeholder="MM" required class="w-1/4 border p-3 rounded-xl">
                    <input name="y" type="number" placeholder="AAAA" required class="w-1/2 border p-3 rounded-xl">
                    <button class="bg-teal-600 text-white p-3 rounded-xl">OK</button>
                </form>`;
        }

        function saveDob(f) {
            const birth = new Date(f.y.value, f.m.value-1, f.d.value);
            const age = new Date().getFullYear() - birth.getFullYear();
            patientData.demographics.fecha_nacimiento = `${f.y.value}-${f.m.value}-${f.d.value}`;
            patientData.demographics.edad = age;
            addMessage(`Tienes ${age} años. ¿Con qué género te identificas?`);
            const g = ['Mujer', 'Hombre', 'Otro'];
            document.getElementById('interaction-area').innerHTML = `<div class="grid grid-cols-3 gap-2">${g.map(x=>`<button onclick="saveGen('${x}')" class="border p-3 rounded-xl">${x}</button>`).join('')}</div>`;
        }

        function saveGen(x) {
            patientData.demographics.genero = x; addMessage(x, 'user');
            addMessage("¿En qué país resides?");
            const p = ['Colombia', 'España', 'Otro'];
            document.getElementById('interaction-area').innerHTML = `<div class="grid grid-cols-3 gap-2">${p.map(x=>`<button onclick="saveGeo('${x}')" class="border p-3 rounded-xl">${x}</button>`).join('')}</div>`;
        }

        function saveGeo(x) {
            patientData.demographics.pais = x;
            patientData.demographics.departamento = "N/A";
            patientData.demographics.ciudad = "Desconocida";
            addMessage(x, 'user');
            addMessage("Casi listos. ¿Tu nivel educativo, profesión, correo, religión, hijos, situación sentimental y si tienes mascotas?");
            document.getElementById('interaction-area').innerHTML = `
                <form onsubmit="event.preventDefault(); saveRest(this)" class="grid grid-cols-2 gap-2 text-xs">
                    <input name="e" placeholder="Correo" required class="border p-2 rounded">
                    <input name="ed" placeholder="Nivel Educativo" required class="border p-2 rounded">
                    <input name="pr" placeholder="Ocupación" required class="border p-2 rounded">
                    <input name="re" placeholder="Religión" required class="border p-2 rounded">
                    <input name="hi" type="number" placeholder="Hijos" required class="border p-2 rounded">
                    <input name="si" placeholder="Situación Sentimental" required class="border p-2 rounded">
                    <input name="ma" placeholder="Mascotas" required class="border p-2 rounded">
                    <button class="bg-teal-600 text-white p-2 rounded col-span-2">Finalizar Perfil</button>
                </form>`;
        }

        function saveRest(f) {
            const d = patientData.demographics;
            d.correo = f.e.value; d.nivel_educativo = f.ed.value; d.profesion = f.pr.value;
            d.religion = f.re.value; d.hijos = f.hi.value; d.situacion_sentimental = f.si.value; d.mascotas = f.ma.value;
            addMessage("Perfil completado."); startTest();
        }

        function startTest() {
            addMessage("Iniciamos los 170 ítems. Responde de 1 a 7.");
            askQ();
        }

        function askQ() {
            if(currentIdx >= 170) return finish();
            document.getElementById('progress-bar').style.width = `${(currentIdx/170)*100}%`;
            addMessage(`<b>${currentIdx+1}.</b> ${questions[currentIdx]}`);
            document.getElementById('interaction-area').innerHTML = `<div class="grid grid-cols-7 gap-1">${[1,2,3,4,5,6,7].map(v=>`<button onclick="saveA(${v})" class="border-2 p-3 rounded-xl font-bold">${v}</button>`).join('')}</div>`;
        }

        function saveA(v) { 
            clearInt(); 
            patientData.answers[`q${currentIdx+1}`] = v; 
            currentIdx++; 
            setTimeout(askQ, 200); 
        }

        async function finish() {
            clearInt(); addMessage("Guardando evaluación...");
            try {
                const res = await fetch('/api/save-report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(patientData) });
                const d = await res.json();
                if(res.ok) addMessage(`¡Listo! Ref: ${d.id_referencia.substring(0,6)}. Puedes cerrar esta pestaña.`);
            } catch(e) { addMessage("Error al guardar."); }
        }

        window.onload = start;
    </script>
</body>
</html>
